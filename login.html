<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eduzone Education Centre</title>
    
    <style>
        /* ---------------------------------------------------- */
        /* 1. THEME VARIABLES (Inherited from the main site) */
        /* ---------------------------------------------------- */
        :root {
            /* Light Theme */
            --color-bg-main: #f0f8ff; 
            --color-bg-secondary: #ffffff; 
            --color-text-primary: #343a40; 
            --color-text-secondary: #6c757d;
            --color-accent: #007bff; 
            --color-header-bg: #ffffff;
            --color-input-bg: #f8f9fa;
        }

        /* Dark Theme Overrides (Deep Navy & Royal Gold) */
        .dark-theme {
            --color-bg-main: #0f172a; 
            --color-bg-secondary: #1e293b; 
            --color-text-primary: #f1f5f9; 
            --color-text-secondary: #94a3b8; 
            --color-accent: #facc15; 
            --color-header-bg: #1e293b;
            --color-input-bg: #334155; 
        }

        /* ---------------------------------------------------- */
        /* 2. BASE & LAYOUT STYLES */
        /* ---------------------------------------------------- */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-bg-main);
            color: var(--color-text-primary);
            transition: background-color 0.5s ease, color 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            width: 90%;
            max-width: 900px; 
            min-height: 550px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            overflow: hidden;
            margin: 40px auto;
            background-color: var(--color-bg-secondary);
        }
        
        /* ---------------------------------------------------- */
        /* 3. NEW: THEME TOGGLE BUTTON STYLES (Fixed Position) */
        /* ---------------------------------------------------- */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: 2px solid var(--color-text-primary);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5em; 
            padding: 10px;
            color: var(--color-text-primary); 
            transition: all 0.3s ease;
            line-height: 1; 
            z-index: 100;
        }

        .theme-toggle:hover {
            color: var(--color-accent);
            border-color: var(--color-accent);
            transform: scale(1.1);
            box-shadow: 0 0 10px var(--color-accent);
        }

        body:not(.dark-theme) .theme-toggle::before {
            content: '☀️'; 
        }
        .dark-theme .theme-toggle::before {
            content: '🌙'; 
        }
        /* ---------------------------------------------------- */


        /* ---------------------------------------------------- */
        /* 4. INFO SIDE (PROMOTION) */
        /* ---------------------------------------------------- */
        .info-side {
            flex: 1;
            background: linear-gradient(135deg, var(--color-accent), #ff9900);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }
        
        .dark-theme .info-side {
            background: linear-gradient(135deg, #0e7490, #155e75);
            color: var(--color-text-primary);
        }

        .info-side h2 {
            font-size: 2em;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .info-side p {
            font-size: 1em;
            margin-bottom: 40px;
            max-width: 350px;
        }

        .register-link {
            display: inline-block;
            padding: 12px 25px;
            border: 2px solid white;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: background-color 0.3s, color 0.3s;
        }

        .register-link:hover {
            background-color: white;
            color: #007bff; 
        }
        
        .dark-theme .register-link {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }
        .dark-theme .register-link:hover {
            background-color: var(--color-accent);
            color: var(--color-bg-secondary);
        }

        /* ---------------------------------------------------- */
        /* 5. FORM SIDE (LOGIN) */
        /* ---------------------------------------------------- */
        .form-side {
            flex: 1.2;
            padding: 50px;
            background-color: var(--color-bg-secondary);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-side h2 {
            text-align: center;
            color: var(--color-accent);
            margin-bottom: 40px;
            font-size: 2.2em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-text-secondary);
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--color-input-bg);
            color: var(--color-text-primary);
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 5px rgba(250, 204, 21, 0.5); 
            outline: none;
        }

        /* Remember Me and Forgot Password */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
        }

        .remember-me input[type="checkbox"] {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            accent-color: var(--color-accent);
        }
        
        .forgot-password a {
            color: var(--color-accent);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .forgot-password a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Button */
        .login-button {
            background-color: var(--color-accent);
            color: var(--color-bg-secondary);
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
            width: 100%;
        }

        .login-button:hover {
            background-color: #eab308; 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        
        /* ---------------------------------------------------- */
        /* 6. RESPONSIVENESS */
        /* ---------------------------------------------------- */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                width: 95%;
                min-height: auto;
            }
            .info-side {
                order: -1; 
                padding: 30px;
                border-radius: 15px 15px 0 0;
            }
            .form-side {
                padding: 30px;
            }
            .info-side h2 {
                font-size: 1.8em;
            }
            .info-side p {
                font-size: 0.9em;
            }
            /* Move toggle button slightly down on mobile if it blocks header content */
            .theme-toggle {
                top: 10px;
                right: 10px;
                padding: 8px;
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body id="body" class="dark-theme"> 

    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Dark Mode"></button>

    <div class="login-container">
        
        <div class="info-side">
            <h2>Welcome Back!</h2>
            <p>Log in to continue your journey. Access your personalized resources, progress reports, and premium content instantly.</p>
            <p style="font-size: 0.9em; margin-bottom: 20px;">New to Eduzone?</p>
            <a href="register.html" class="register-link">Register Now &rarr;</a>
        </div>
        
        <div class="form-side">
            <h2>Student Login</h2>
            
            <form action="process_login.php" method="POST">
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your registered email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <div class="options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember Me</label>
                    </div>
                    <div class="forgot-password">
                        <a href="forgot_password.php">Forgot Password?</a>
                    </div>
                </div>
                
                <button type="submit" class="login-button">Log In to Dashboard</button>
            </form>
        </div>
        
    </div>
    
    <script>
        // ----------------------------------------------------
        // ADDED: THEME TOGGLE FUNCTIONALITY
        // ----------------------------------------------------
        const body = document.getElementById('body');
        const darkThemeClass = 'dark-theme';

        function setTheme(isDark) {
            if (isDark) {
                body.classList.add(darkThemeClass);
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove(darkThemeClass);
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleTheme() {
            const isDark = body.classList.contains(darkThemeClass);
            setTheme(!isDark);
        }

        // Theme preservation script (Ensures theme persists across pages)
        (function() {
            const savedTheme = localStorage.getItem('theme');
            
            if (savedTheme === 'dark') {
                body.classList.add(darkThemeClass);
            } else if (savedTheme === 'light') {
                body.classList.remove(darkThemeClass);
            } else {
                // Default behavior: Check system preference or default to dark
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    body.classList.add(darkThemeClass);
                } else {
                     body.classList.remove(darkThemeClass); // Default to light if no saved pref
                }
            }
        })();
    </script>

</body>
</html>
